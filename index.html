// Percorso scoring: each answer votes for a path
// crescita_personale, business, digitale
const percorsoScore = (answers) => {
  const scores = { crescita_personale: 0, business: 0, digitale: 0 };
  
  // Situazione
  const situazioneMap = {
    zero: { crescita_personale: 2, business: 1, digitale: 1 },
    dipendente: { crescita_personale: 1, business: 2, digitale: 1 },
    inizio: { crescita_personale: 0, business: 2, digitale: 2 },
    crescita: { crescita_personale: 0, business: 2, digitale: 2 },
    mamma: { crescita_personale: 2, business: 2, digitale: 1 },
  };
  if (situazioneMap[answers.situazione]) {
    Object.entries(situazioneMap[answers.situazione]).forEach(([k,v]) => scores[k] += v);
  }
  
  // Obiettivi
  const obiettiviMap = {
    liberta: { crescita_personale: 1, business: 2, digitale: 1 },
    ritrovare_me: { crescita_personale: 3, business: 0, digitale: 0 },
    business: { crescita_personale: 0, business: 3, digitale: 1 },
    digitale: { crescita_personale: 0, business: 1, digitale: 3 },
    tempo: { crescita_personale: 2, business: 1, digitale: 1 },
    sicurezza: { crescita_personale: 1, business: 2, digitale: 1 },
  };
  (answers.obiettivi || []).forEach(o => {
    if (obiettiviMap[o]) Object.entries(obiettiviMap[o]).forEach(([k,v]) => scores[k] += v);
  });
  
  // Ostacoli
  const ostacoliMap = {
    autostima: { crescita_personale: 3, business: 0, digitale: 0 },
    paura: { crescita_personale: 3, business: 1, digitale: 0 },
    digitale: { crescita_personale: 0, business: 1, digitale: 3 },
    idea: { crescita_personale: 1, business: 3, digitale: 0 },
    tempo: { crescita_personale: 2, business: 1, digitale: 1 },
    partenza: { crescita_personale: 2, business: 2, digitale: 1 },
  };
  (answers.ostacoli || []).forEach(o => {
    if (ostacoliMap[o]) Object.entries(ostacoliMap[o]).forEach(([k,v]) => scores[k] += v);
  });
  
  return Object.entries(scores).sort((a,b) => b[1]-a[1])[0][0];
};

const sendToWebhook = async (webhookUrl, answers, result) => {
  if (!webhookUrl) return { success: false, reason: "no_url" };
  const payload = {
    timestamp: new Date().toISOString(),
    source: "unfuckwithable_quiz_funnel",
    contatto: {
      nome: answers.contatti?.nome || "",
      email: answers.contatti?.email || "",
      instagram: answers.contatti?.instagram || "",
    },
    quiz: {
      situazione: answers.situazione,
      obiettivi: answers.obiettivi || [],
      ostacoli: answers.ostacoli || [],
      impegno: answers.impegno,
      impegno_label: impegnoLabels[answers.impegno] || "",
      percorso_assegnato: percorsoScore(answers),
    },
    segmentazione: {
      tags: segmentTags[answers.impegno] || ["lead"],
      percorso: percorsoScore(answers),
      priorita: ["tanto", "tutto"].includes(answers.impegno) ? "alta"
        : answers.impegno === "medio" ? "media" : "normale",
    },
    profilo_ai: {
      titolo: result.titolo,
      lead_magnet_assegnato: result.leadMagnet?.nome || "",
      messaggio_finale: result.finale,
    },
  };
  try {
    const res = await fetch(webhookUrl, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload),
    });
    return { success: res.ok, status: res.status, payload };
  } catch (err) {
    return { success: false, error: err.message, payload };
  }
};

function WebhookBadge({ status }) {

  const ok = status.success;
  return (
    <div style={{
      display: "inline-flex", alignItems: "center", gap: "0.375rem",
      padding: "0.3rem 0.875rem", borderRadius: "100px", marginTop: "1rem",

      border: `1px solid ${ok ? COLORS.successGreen : COLORS.errorRed}40`,
    }}>
      <span style={{ fontSize: "0.65rem" }}>{ok ? "✓" : "✕"}</span>
      <span style={{
        fontSize: "0.65rem", letterSpacing: "0.06em",

      }}>

  );
}

// ─── PROGRESS BAR ──────────────────────────────────────────────────

function ProgressBar({ current, total }) {
  const pct = ((current - 1) / (total - 1)) * 100;
  return (
    <div style={{ marginBottom: "2rem" }}>
      <div style={{ display: "flex", justifyContent: "space-between", marginBottom: "0.5rem" }}>
        {steps.map((s) => (
          <div key={s.id} style={{
            fontSize: "0.6rem", letterSpacing: "0.1em",
            color: current >= s.id ? COLORS.roseGold : COLORS.taupe,
            fontFamily: "'Cormorant Garamond', serif", fontWeight: 600, transition: "color 0.4s",
          }}>
            {s.id < 5 ? `0${s.id}` : ""}
          </div>
        ))}
      </div>
      <div style={{ height: "2px", background: COLORS.blushDeep, borderRadius: "2px", overflow: "hidden" }}>
        <div style={{
          height: "100%", width: `${pct}%`,
          background: `linear-gradient(90deg, ${COLORS.roseGold}, ${COLORS.blushDeep})`,
          borderRadius: "2px", transition: "width 0.6s cubic-bezier(0.4,0,0.2,1)",
        }} />
      </div>
    </div>
  );
}

          textTransform: "uppercase", marginBottom: "0.75rem",
        }}>
          ▸ IL TUO PROSSIMO PASSO

        <div style={{ display: "flex", flexDirection: "column", gap: "0.5rem" }}>

                borderRadius: "50%", display: "flex", alignItems: "center", justifyContent: "center",

                fontFamily: "'Cormorant Garamond', serif", fontWeight: 700,

                {i + 1}

              <p style={{ color: COLORS.text, fontSize: "0.875rem", lineHeight: 1.5, fontFamily: "'Lato', sans-serif", margin: 0 }}>

        </div>

      {/* Percorso Assegnato */}
      {result.pInfo && (

          padding: "1.5rem",

          </p>
          <p style={{
            fontSize: "0.65rem", letterSpacing: "0.15em", color: COLORS.roseGold,
            fontFamily: "'Lato', sans-serif", fontWeight: 700,
            textTransform: "uppercase", marginBottom: "0.5rem",
          }}>
            {result.pInfo.label}
          </p>
          <p style={{
            fontSize: "1.1rem", fontFamily: "'Cormorant Garamond', serif", fontWeight: 700,
            color: COLORS.text, marginBottom: "0.75rem", fontStyle: "italic",
          }}>
            {result.pInfo.nome}

// ─── MAIN APP ──────────────────────────────────────────────────────

function QuizFunnel() {
  const [currentStep, setCurrentStep] = useState(1);
  const [answers, setAnswers] = useState({
    situazione: null, obiettivi: [], ostacoli: [], impegno: null, contatti: {},
  });
  const [loading, setLoading] = useState(false);
  const [result, setResult] = useState(null);
  const [animating, setAnimating] = useState(false);
  const [webhookStatus, setWebhookStatus] = useState(null);
  const [config, setConfig] = useState({ webhookUrl: "https://forminit.com/f/g4ifebtb63i", leadMagnetUrl: "https://drive.google.com/file/d/1wKUS-1SxHLI3d8hi8W8eOAQpxZpuWGOM/view?usp=drivesdk" });
  const containerRef = useRef(null);

  const step = steps[currentStep - 1];

  const canProceed = () => {
    if (!step) return false;
    if (step.type === "single") return !!(answers[step.field]);
    if (step.type === "multi") return (answers[step.field] || []).length > 0;
    if (step.type === "contact") return !!(answers.contatti.nome && answers.contatti.email);
    if (step.type === "single" && step.field === "impegno") return !!answers.impegno;
    return false;
  };

  const handleOption = (value) => {
    if (step.type === "single") {
      setAnswers({ ...answers, [step.field]: value });
    } else if (step.type === "multi") {
      const current = answers[step.field] || [];
      const updated = current.includes(value)
        ? current.filter((v) => v !== value)
        : [...current, value];
      setAnswers({ ...answers, [step.field]: updated });
    }
  };

  const goNext = async () => {
    if (!canProceed()) return;
    if (currentStep < steps.length) {
      setAnimating(true);
      setTimeout(() => { setCurrentStep(currentStep + 1); setAnimating(false); }, 300);
    } else {
      await generateResult();
    }
  };

  const generateResult = async () => {
    setLoading(true);
    const percorso = percorsoScore(answers);
    const pInfo = percorsoInfo[percorso];
    let parsed = null;
    try {
      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1000,
          messages: [{ role: "user", content: buildPrompt(answers, percorso) }],
        }),
      });
      const data = await response.json();
      const text = data.content.map((b) => b.text || "").join("");
      parsed = JSON.parse(text.replace(/```json|```/g, "").trim());
    } catch {
      parsed = {
        titolo: "Il Fuoco Sotto la Cenere",
        momento: "Senti da tempo che c'è qualcosa di più per te — una vita più tua, più libera. Lo sai. Ma ogni volta che ti avvicini a quel sogno, una voce ti dice che non sei ancora pronta. Quella voce mente.",
        blocco: "La credenza che ti blocca non è la mancanza di preparazione — è la convinzione che devi essere perfetta prima di iniziare. Fatto è meglio che perfetto.",
        passi: [
          "Scrivi in una frase cosa vuoi costruire — non deve essere perfetta, deve esistere",
          "Pubblica qualcosa oggi: una storia, un post, qualcosa di tuo",
          "Identifica la prima piccola azione che hai rimandato per paura e falla oggi",
          "Metti in calendario 30 minuti questa settimana dedicati solo a te",
        ],
        percorso_spiegazione: pInfo?.desc || "Questo percorso è quello più adatto a te in questo momento.",
        finale: "Non sei in ritardo. Hai tutto quello che serve per iniziare — adesso. UNFUCKWITHABLE.",
      };
    }

    // Fire webhook (non-blocking for UX)
    if (config.webhookUrl) {
      sendToWebhook(config.webhookUrl, answers, { ...parsed, percorso }).then(setWebhookStatus);
    }

    setResult({ ...parsed, percorso, pInfo });
    setCurrentStep(6);
    setLoading(false);
  };

  return (
    <>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600;1,700&family=Lato:wght@300;400;700&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: ${COLORS.warm}; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: ${COLORS.blush}; }
        ::-webkit-scrollbar-thumb { background: ${COLORS.roseGold}; border-radius: 4px; }
      `}</style>

      <AdminPanel config={config} onSave={setConfig} />

      <div style={{
        minHeight: "100vh",
        background: `radial-gradient(ellipse at 20% 0%, ${COLORS.blush}80 0%, transparent 60%), radial-gradient(ellipse at 80% 100%, ${COLORS.sand}60 0%, transparent 60%), ${COLORS.warm}`,
        display: "flex", alignItems: "center", justifyContent: "center",
        padding: "2rem 1rem", fontFamily: "'Lato', sans-serif",
      }}>
        {/* Decorative lines */}
        <div style={{ position: "fixed", top: 0, left: 0, right: 0, bottom: 0, pointerEvents: "none", overflow: "hidden" }}>
          {[...Array(3)].map((_, i) => (
            <div key={i} style={{
              position: "absolute", top: `${20 + i * 30}%`, left: "-20%",
              width: "140%", height: "1px",
              background: `linear-gradient(90deg, transparent, ${COLORS.blushDeep}40, transparent)`,
              transform: `rotate(${-5 + i * 5}deg)`,
            }} />
          ))}
        </div>

        <div ref={containerRef} style={{ width: "100%", maxWidth: "560px", position: "relative", zIndex: 1 }}>
          {/* Brand */}
          <div style={{ textAlign: "center", marginBottom: "2.5rem" }}>
            <p style={{
              fontSize: "0.65rem", letterSpacing: "0.35em", color: COLORS.roseGold,
              fontFamily: "'Cormorant Garamond', serif", fontWeight: 700, textTransform: "uppercase",
            }}>
              UNFUCKWITHABLE
            </p>
            <div style={{ width: "40px", height: "1px", background: COLORS.roseGold, margin: "0.5rem auto" }} />
          </div>

          {/* Card */}
          <div style={{
            background: "rgba(253, 248, 244, 0.85)", backdropFilter: "blur(20px)",
            borderRadius: "24px", padding: "2.5rem",
            border: `1px solid ${COLORS.blushDeep}`,
            boxShadow: `0 20px 60px ${COLORS.roseGold}15, 0 4px 20px rgba(0,0,0,0.04)`,
            opacity: animating ? 0 : 1,
            transform: animating ? "translateY(8px)" : "translateY(0)",
            transition: "opacity 0.3s, transform 0.3s",
          }}>

            {currentStep < 6 && !loading && (
              <>
                <ProgressBar current={currentStep} total={5} />
                <p style={{
                  fontSize: "0.6rem", letterSpacing: "0.2em", color: COLORS.roseGold,
                  fontFamily: "'Cormorant Garamond', serif", fontWeight: 700,
                  textTransform: "uppercase", marginBottom: "0.5rem",
                }}>
                  {step.label}
                </p>
                <h1 style={{
                  fontSize: "1.5rem", fontFamily: "'Cormorant Garamond', serif",
                  fontWeight: 700, color: COLORS.text, lineHeight: 1.25, marginBottom: "0.5rem",
                }}>
                  {step.title}
                </h1>
                <p style={{ fontSize: "0.85rem", color: COLORS.textLight, marginBottom: "1.75rem", lineHeight: 1.6 }}>
                  {step.subtitle}
                </p>

                {step.type === "contact" ? (
                  <ContactForm
                    value={answers.contatti}
                    onChange={(v) => setAnswers({ ...answers, contatti: v })}
                  />
                ) : (
                  <div style={{ display: "flex", flexDirection: "column", gap: "0.625rem" }}>
                    {step.options.map((opt) => {
                      const selected = step.type === "single"
                        ? answers[step.field] === opt.value
                        : (answers[step.field] || []).includes(opt.value);
                      return (
                        <OptionButton
                          key={opt.value} label={opt.label} selected={selected}
                          multi={step.type === "multi"} onClick={() => handleOption(opt.value)}
                        />
                      );
                    })}
                  </div>
                )}

                <div style={{ marginTop: "2rem", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                  {currentStep > 1 ? (
                    <button
                      onClick={() => setCurrentStep(currentStep - 1)}
                      style={{
                        background: "none", border: "none", color: COLORS.textLight,
                        fontSize: "0.8rem", cursor: "pointer",
                        fontFamily: "'Lato', sans-serif", letterSpacing: "0.05em",
                      }}
                    >
                      ← Indietro
                    </button>
                  ) : <div />}
                  <button
                    onClick={goNext}
                    disabled={!canProceed()}
                    style={{
                      padding: "0.875rem 2rem",
                      background: canProceed()
                        ? `linear-gradient(135deg, ${COLORS.roseGold}, ${COLORS.accent})`
                        : COLORS.blushDeep,
                      border: "none", borderRadius: "100px",
                      color: canProceed() ? "white" : COLORS.taupe,
                      fontSize: "0.8rem", letterSpacing: "0.12em",
                      fontFamily: "'Cormorant Garamond', serif", fontWeight: 700,
                      textTransform: "uppercase", cursor: canProceed() ? "pointer" : "not-allowed",
                      transition: "all 0.3s",
                      boxShadow: canProceed() ? `0 4px 20px ${COLORS.roseGold}40` : "none",
                    }}
                  >
                    {currentStep === 5 ? "Scopri il tuo profilo →" : "Continua →"}
                  </button>
                </div>
              </>
            )}

            {loading && (
              <div style={{ textAlign: "center", padding: "3rem 0" }}>
                <div style={{
                  width: "48px", height: "48px",
                  border: `3px solid ${COLORS.blushDeep}`,
                  borderTop: `3px solid ${COLORS.roseGold}`,
                  borderRadius: "50%", margin: "0 auto 1.5rem",
                  animation: "spin 1s linear infinite",
                }} />
                <style>{`@keyframes spin { to { transform: rotate(360deg); } }`}</style>
                <p style={{ fontFamily: "'Cormorant Garamond', serif", fontSize: "1.1rem", fontStyle: "italic", color: COLORS.text }}>
                  Sto costruendo il tuo profilo personalizzato…
                </p>
                <p style={{ fontSize: "0.8rem", color: COLORS.textLight, marginTop: "0.5rem" }}>
                  Ci vogliono pochi secondi
                </p>
              </div>
            )}

            {currentStep === 6 && result && !loading && (
              <ResultCard
                result={result}
                webhookStatus={webhookStatus}
                leadMagnetUrl={config.leadMagnetUrl}
              />
            )}
          </div>

          {currentStep < 6 && !loading && (
            <p style={{
              textAlign: "center", marginTop: "1.5rem",
              fontSize: "0.7rem", color: COLORS.taupe,
              fontFamily: "'Lato', sans-serif", letterSpacing: "0.03em",
            }}>
              100% gratuito · Nessuno spam · Puoi cancellarti in qualsiasi momento
            </p>
          )}
        </div>
      </div>
    </>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<QuizFunnel />);
  </script>
</body>
</html>
